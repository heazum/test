<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Запис на послуги</title>
    <link rel="stylesheet" href="style.css">
    <!-- Підключення Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Екран 1: Вибір послуги -->
        <section id="screen-services" class="screen active">
            <header class="main-header">
                <div class="logo-placeholder">
                    <span>LOGO</span>
                </div>
                <h1>Привіт!<br>Оберіть послугу</h1>
            </header>
            
            <div class="services-container">
                <div class="services-list" id="services-list">
                    <div class="card service-card" data-type="lesson">
                        <div class="service-icon">🥁</div>
                        <div class="service-content">
                            <h3>Урок</h3>
                            <p>Індивідуальне заняття з викладачем</p>
                        </div>
                    </div>
                    
                    <div class="card service-card" data-type="rent">
                        <div class="service-icon">🎙️</div>
                        <div class="service-content">
                            <h3>Оренда</h3>
                            <p>Самостійне заняття</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Екран 2: Вибір викладача -->
        <section id="screen-specialists" class="screen">
            <header class="nav-header">
                <div class="header-top">
                    <button class="back-btn">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.28 5.22a.75.75 0 0 1 0 1.06L9.56 12l5.72 5.72a.75.75 0 0 1-1.06 1.06l-6.25-6.25a.75.75 0 0 1 0-1.06l6.25-6.25a.75.75 0 0 1 1.06 0Z"/>
                        </svg> Назад
                    </button>
                </div>
                <h2>Оберіть викладача</h2>
            </header>
            
            <div class="services-list" id="teachers-list">
                <p class="loading-text">Завантаження викладачів...</p>
            </div>
        </section>

        <!-- Екран 3: Вибір дати та часу -->
        <section id="screen-datetime" class="screen">
            <header class="nav-header sticky-header">
                <div class="header-top">
                    <button class="back-btn">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.28 5.22a.75.75 0 0 1 0 1.06L9.56 12l5.72 5.72a.75.75 0 0 1-1.06 1.06l-6.25-6.25a.75.75 0 0 1 0-1.06l6.25-6.25a.75.75 0 0 1 1.06 0Z"/>
                        </svg> Назад
                    </button>
                </div>
                <div class="booking-summary" id="booking-summary">
                    <!-- Заповнюється динамічно -->
                </div>
            </header>
            
            <div class="datetime-container">
                <h3>Оберіть дату</h3>
                <div class="horizontal-scroll dates-scroll" id="dates-container">
                    <!-- Заповнюється динамічно з JS -->
                </div>

                <h3>Оберіть час</h3>
                <div class="time-grid" id="time-container">
                    <!-- Заповнюється динамічно з бази -->
                </div>
            </div>

            <div class="footer-action">
                <button id="book-btn" class="primary-btn" disabled>Забронювати</button>
            </div>
        </section>
    </div>

    <!-- JS Логіка -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const supabaseUrl = ''; // Вставте ваш Supabase URL
            const supabaseKey = ''; // Вставте ваш Supabase Anon Key
            
            // Замініть на реальний ID кімнати з таблиці resources для Оренди
            const RENT_ROOM_ID = 'your_room_id_here'; 
            
            let supabaseClient = null;
            if (supabaseUrl && supabaseKey) {
                supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
            }

            const state = {
                history: ['screen-services'],
                booking: {
                    type: null,
                    resourceId: null, // ID викладача або ID кімнати
                    teacherName: null,
                    date: null,
                    time: null
                }
            };

            const screens = {
                'screen-services': document.getElementById('screen-services'),
                'screen-specialists': document.getElementById('screen-specialists'),
                'screen-datetime': document.getElementById('screen-datetime')
            };

            const bookBtn = document.getElementById('book-btn');
            const bookingSummary = document.getElementById('booking-summary');
            const datesContainer = document.getElementById('dates-container');
            const timeContainer = document.getElementById('time-container');

            // --- Навігація ---
            function navigateTo(screenId) {
                Object.values(screens).forEach(screen => screen.classList.remove('active'));
                screens[screenId].classList.add('active');
                
                if (state.history[state.history.length - 1] !== screenId) {
                    state.history.push(screenId);
                }
                window.scrollTo(0, 0);
            }

            function goBack() {
                if (state.history.length > 1) {
                    state.history.pop();
                    const previousScreenId = state.history[state.history.length - 1];
                    
                    Object.values(screens).forEach(screen => screen.classList.remove('active'));
                    screens[previousScreenId].classList.add('active');
                    
                    if (previousScreenId === 'screen-services') {
                        resetBooking();
                    }
                }
            }

            document.querySelectorAll('.back-btn').forEach(btn => {
                btn.addEventListener('click', goBack);
            });

            // --- Логіка Екрану 1 ---
            document.querySelectorAll('#screen-services .service-card').forEach(card => {
                card.addEventListener('click', () => {
                    const type = card.dataset.type;
                    state.booking.type = type;

                    if (type === 'lesson') {
                        loadTeachers();
                        navigateTo('screen-specialists');
                    } else if (type === 'rent') {
                        state.booking.resourceId = RENT_ROOM_ID; 
                        state.booking.teacherName = null;
                        updateSummary();
                        generateDates();
                        navigateTo('screen-datetime');
                    }
                });
            });

            // --- Логіка Екрану 2 ---
            async function loadTeachers() {
                const teachersList = document.getElementById('teachers-list');
                teachersList.innerHTML = '<p class="loading-text">Завантаження викладачів...</p>';

                if (!supabaseClient) {
                    teachersList.innerHTML = '<p class="loading-text">Будь ласка, вкажіть Supabase ключі.</p>';
                    return;
                }

                try {
                    const { data: teachers, error } = await supabaseClient
                        .from('resources')
                        .select('*')
                        .eq('resource_type', 'teacher')
                        .eq('is_active', true);
                    
                    if (error) throw error;
                    teachersList.innerHTML = '';

                    if (!teachers || teachers.length === 0) {
                        teachersList.innerHTML = '<p class="loading-text">Викладачів не знайдено.</p>';
                        return;
                    }

                    teachers.forEach(teacher => {
                        const card = document.createElement('div');
                        card.className = 'card service-card'; 
                        card.dataset.id = teacher.id;

                        card.innerHTML = `
                            <div class="teacher-avatar"></div>
                            <div class="service-content">
                                <h3>${teacher.name || 'Без імені'}</h3>
                                <p>Викладач</p>
                            </div>
                        `;

                        card.addEventListener('click', () => {
                            state.booking.resourceId = teacher.id;
                            state.booking.teacherName = teacher.name || 'Без імені';
                            updateSummary();
                            generateDates();
                            navigateTo('screen-datetime');
                        });
                        
                        teachersList.appendChild(card);
                    });
                } catch (err) {
                    console.error("Помилка завантаження викладачів:", err);
                    teachersList.innerHTML = '<p class="loading-text">Помилка завантаження. Перевірте мережу.</p>';
                }
            }

            // --- Логіка Екрану 3 ---
            function updateSummary() {
                if (state.booking.type === 'lesson') {
                    bookingSummary.innerHTML = `
                        <div class="summary-details">
                            <h4>Урок. Викладач: ${state.booking.teacherName}</h4>
                            <p>Вибір дати та часу</p>
                        </div>
                    `;
                } else {
                    bookingSummary.innerHTML = `
                        <div class="summary-details">
                            <h4>Оренда студії</h4>
                            <p>Вибір дати та часу</p>
                        </div>
                    `;
                }
            }

            function generateDates() {
                const today = new Date();
                const days = ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
                let html = '';
                
                for (let i = 0; i < 14; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() + i);
                    const dayName = days[d.getDay()];
                    const dayNumber = d.getDate();
                    
                    const dateObj = new Date(d.getTime() - (d.getTimezoneOffset() * 60000));
                    const fullDate = dateObj.toISOString().split('T')[0];
                    
                    const isSelected = i === 0 ? 'selected' : '';
                    if (i === 0) state.booking.date = fullDate;
                    
                    html += `
                        <button class="date-btn ${isSelected}" data-date="${fullDate}">
                            <span class="day-name">${dayName}</span>
                            <span class="day-number">${dayNumber}</span>
                        </button>
                    `;
                }
                datesContainer.innerHTML = html;

                document.querySelectorAll('.date-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('selected'));
                        const target = e.currentTarget;
                        target.classList.add('selected');
                        state.booking.date = target.dataset.date;
                        
                        state.booking.time = null;
                        updateBookButton();
                        fetchAvailableSlots(state.booking.date, state.booking.resourceId);
                    });
                });

                // Завантажуємо слоти для поточного (першого) дня
                fetchAvailableSlots(state.booking.date, state.booking.resourceId);
            }

            // --- Логіка таймслотів (Supabase) ---
            const ALL_SLOTS = ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00'];

            async function fetchAvailableSlots(selectedDate, resourceId) {
                timeContainer.innerHTML = '<p class="loading-text" style="grid-column: 1 / -1;">Перевірка розкладу...</p>';

                if (!supabaseClient || !resourceId) {
                    timeContainer.innerHTML = '<p class="loading-text" style="grid-column: 1 / -1;">Не вдалося завантажити слоти (відсутні ключі або ресурс).</p>';
                    return;
                }

                try {
                    const { data: bookings, error } = await supabaseClient
                        .from('bookings')
                        .select('start_time')
                        .eq('booking_date', selectedDate)
                        .eq('resource_id', resourceId);

                    if (error) throw error;

                    // Якщо база повертає час у форматі "10:00:00", обрізаємо до "10:00"
                    const bookedTimes = bookings.map(b => b.start_time.substring(0, 5));

                    // Відфільтровуємо зайняті години
                    const availableSlots = ALL_SLOTS.filter(slot => !bookedTimes.includes(slot));

                    timeContainer.innerHTML = '';

                    if (availableSlots.length === 0) {
                        timeContainer.innerHTML = '<p class="loading-text" style="grid-column: 1 / -1;">На жаль, на цей день всі місця зайняті.</p>';
                        return;
                    }

                    availableSlots.forEach(slot => {
                        const btn = document.createElement('button');
                        btn.className = 'time-btn';
                        btn.textContent = slot;
                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                            state.booking.time = slot;
                            updateBookButton();
                        });
                        timeContainer.appendChild(btn);
                    });

                } catch (err) {
                    console.error("Помилка завантаження слотів:", err);
                    timeContainer.innerHTML = '<p class="loading-text" style="grid-column: 1 / -1;">Помилка завантаження розкладу. Спробуйте пізніше.</p>';
                }
            }

            function updateBookButton() {
                bookBtn.disabled = !(state.booking.date && state.booking.time);
            }

            function resetBooking() {
                state.booking = { type: null, resourceId: null, teacherName: null, date: null, time: null };
            }

            // --- Кнопка "Забронювати" ---
            async function createBooking() {
                bookBtn.disabled = true;
                bookBtn.textContent = 'Бронюємо...';

                const { date, time, resourceId } = state.booking;

                try {
                    const { error } = await supabaseClient
                        .from('bookings')
                        .insert([
                            {
                                booking_date: date,
                                start_time: time,
                                resource_id: resourceId,
                                status: 'confirmed'
                            }
                        ]);

                    if (error) throw error;

                    alert("Успішно заброньовано!");
                    
                    // Повернення на головний екран
                    state.history = ['screen-services'];
                    Object.values(screens).forEach(screen => screen.classList.remove('active'));
                    screens['screen-services'].classList.add('active');
                    resetBooking();
                    window.scrollTo(0, 0);

                } catch (err) {
                    console.error("Помилка бронювання:", err);
                    alert("Помилка бронювання. Спробуйте ще раз.");
                } finally {
                    bookBtn.textContent = 'Забронювати';
                    updateBookButton();
                }
            }

            bookBtn.addEventListener('click', createBooking);
        });
    </script>
</body>
</html>
